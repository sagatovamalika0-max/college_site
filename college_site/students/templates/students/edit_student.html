<!DOCTYPE html>
<html>
<head>
    <title>Редактировать студента</title>
</head>
<body>

<h1>Редактировать студента</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    Имя:<br>
    <input type="text" name="first_name" value="{{ student.first_name }}"><br><br>

    Фамилия:<br>
    <input type="text" name="last_name" value="{{ student.last_name }}"><br><br>

    Возраст:<br>
    <input type="number" name="age" value="{{ student.age }}"><br><br>

    Группа:<br>
    <input type="text" name="group" value="{{ student.group }}"><br><br>

    Фото:<br>
    <input type="file" name="photo"><br><br>

    <button type="submit">Сохранить</button>
</form>

<br>
<a href="/students/">Назад</a>

</body>
</html>
